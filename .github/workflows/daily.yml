name: Daily TimesFM Trader

on:
  schedule:
    # 21:30 UTC = ~4:30pm ET, ~30 min after US market close
    # crypto runs whenever; stocks use this day's close
    - cron: "30 21 * * 1-5"
  workflow_dispatch:        # also allow manual runs

permissions:
  contents: write           # we commit the updated portfolio.json back

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-timesfm-2.5-200m

      - name: Run trader
        env:
          NOTION_TOKEN:            ${{ secrets.NOTION_TOKEN }}
          NOTION_TRADE_LOG_ID:     ${{ secrets.NOTION_TRADE_LOG_ID }}
          NOTION_SCAN_LOG_ID:      ${{ secrets.NOTION_SCAN_LOG_ID }}
          NOTION_NEWS_DATABASE_ID: ${{ secrets.NOTION_NEWS_DATABASE_ID }}
          NOTION_PARENT_PAGE_ID:   ${{ secrets.NOTION_PARENT_PAGE_ID }}
          FINNHUB_API_KEY:         ${{ secrets.FINNHUB_API_KEY }}
          PYTHONUNBUFFERED:        "1"
        run: python trader.py

      - name: Commit updated portfolio state
        run: |
          git config user.name  "timesfm-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/portfolio.json
          git diff --cached --quiet || git commit -m "Update portfolio state [skip ci]"
          git push
